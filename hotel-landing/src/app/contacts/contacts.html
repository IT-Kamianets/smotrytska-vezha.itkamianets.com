<section id="contacts" class="contacts-component section">
  <div class="container">
    <div class="content">
      <h2 class="title is-2 has-text-centered">Контакти</h2>

      <div class="columns is-multiline is-centered mt-6">
        <div class="column is-full-mobile is-half-tablet is-one-third-desktop">
          <div class="map-container">
            <iframe
              src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d2725.1234567890!2d26.5!3d48.75!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x0%3A0x0!2sKamianets-Podilskyi!5e0!3m2!1suk!2sua!4v1234567890"
              width="100%" height="400" style="border:0; border-radius: 8px;" allowfullscreen="" loading="lazy"
              referrerpolicy="no-referrer-when-downgrade">
            </iframe>
          </div>
        </div>

        <div class="column is-full-mobile is-half-tablet is-one-third-desktop">
          <div class="contact-info-container">
            <div class="contact-item" *ngFor="let info of contactInfo">
              <div class="contact-icon">
                <span class="icon has-text-primary">
                  <i [class]="info.icon" style="font-size: 1.5rem;"></i>
                </span>
              </div>
              <div class="contact-details">
                <h3 class="title is-5">{{ info.title }}</h3>
                <a [href]="info.link" target="_blank" class="contact-link">
                  {{ info.value }}
                </a>
              </div>
            </div>

            <hr>

            <div class="social-links mt-4">
              <h4 class="title is-6">Слідкуйте за нами:</h4>
              <div class="level">
                <div class="level-item">
                  <a href="#" class="social-link facebook" title="Facebook">
                    <span class="icon">
                      <i class="fab fa-facebook"></i>
                    </span>
                  </a>
                </div>
                <div class="level-item">
                  <a href="#" class="social-link instagram" title="Instagram">
                    <span class="icon">
                      <i class="fab fa-instagram"></i>
                    </span>
                  </a>
                </div>
                <div class="level-item">
                  <a href="#" class="social-link viber" title="Viber">
                    <span class="icon">
                      <i class="fab fa-viber"></i>
                    </span>
                  </a>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
